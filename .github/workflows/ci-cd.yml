name: Java CI Pipeline

on:
  push:
    branches:
      - main
      
  

jobs:
  main-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          
      - name: Build Main project
        working-directory: Main
        run: ant clean build

      - name: Run Calculator tests
        working-directory: Main
        run: |
          mkdir -p out
          javac -d out src/main/Calculator.java test/main/CalculatorTest.java
          java -cp out main.CalculatorTest

  array-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: ant

      - name: Build Array_02 project
        working-directory: "Array_ 02"
        run: ant clean build

      - name: Run local java-build-action
        uses: ./.github/actions/java-build-action
        with:
          workdir: "Array_ 02"