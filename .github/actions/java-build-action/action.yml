name: 'Java Build Action'
description: 'Compile a Java project with Ant from the provided working directory'
inputs:
  workdir:
    description: 'Working directory for the build'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '11'

    - name: Build with Ant
      run: |
        echo "Building in '${{ inputs.workdir }}'"
        cd "${{ inputs.workdir }}"
        ant clean build
      shell: bash
